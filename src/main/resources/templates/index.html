<!DOCTYPE html>
<html lang="ru" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${title}">НССЛ</title>

    <link rel="icon" type="image/jpeg" th:href="@{/resources/liga_logo_1.jpg}">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>

<body>

<header>
    <div class="header-main">
        <div class="container">
            <a th:href="@{/}" class="logo">
                <img th:src="@{/resources/liga_logo.jpg}">
                <div class="logo-text">НССЛ ДЖИУ-ДЖИТСУ</div>
            </a>

            <nav>
                <ul>
                    <li><a th:href="@{/}">Главная</a></li>
                    <li><a th:href="@{/about}">О лиге</a></li>
                    <li><a th:href="@{/news}">Новости</a></li>
                </ul>
            </nav>
        </div>
    </div>
</header>

<!-- HERO (ВОЗВРАЩАЕМ КАК БЫЛО) -->
<section class="hero">
    <div class="container">

        <div class="hero-content">
            <h1>НССЛ ДЖИУ-ДЖИТСУ</h1>
            <p>Развитие студенческого джиу-джитсу в России</p>
        </div>

        <div class="hero-image">
            <div class="hero-image-placeholder">
                <img th:src="@{/resources/mai_photo_index.jpg}"
                     style="width:100%; height:100%; object-fit:cover; border-radius:8px;">
            </div>
        </div>

    </div>
</section>

<!-- NEWS -->
<section class="news-slider-section">
    <div class="container">

        <div class="slider-header">
            <h2>Новости</h2>
            <a th:href="@{/news}">Все новости →</a>
        </div>

        <div class="slider-wrapper">

            <button class="slider-btn left" onclick="scrollNews(-1)">‹</button>

            <div class="slider" id="newsSlider">

                <div th:each="news : ${newsList}">
                    <div th:replace="~{fragments/news-card :: newsCard(${news})}"></div>
                </div>

            </div>

            <button class="slider-btn right" onclick="scrollNews(1)">›</button>

        </div>

    </div>
</section>

<footer>
    <p>© 2021–2026 НССЛ</p>
</footer>

<script>
    const slider = document.getElementById("newsSlider");

    function scrollNews(dir) {
        const card = slider.querySelector(".slide");
        const width = card ? card.offsetWidth + 20 : 350;

        slider.scrollBy({
            left: dir * width,
            behavior: "smooth"
        });
    }

    function moveImg(btn, dir) {
        const track = btn.parentElement.querySelector(".image-track");
        const img = track.querySelector("img");
        const width = img ? img.offsetWidth : 300;

        track.scrollBy({
            left: dir * width,
            behavior: "smooth"
        });
    }
</script>

</body>
</html>
